<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Echo Page</title>
    <link rel="icon" type="image/x-icon" href="search.ico">

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            var form = document.getElementById("echoForm");

            document.getElementById("echoForm").addEventListener("submit", function(event) {
                var language = document.getElementById("language").value;
                var method = document.getElementById("method").value;
                var encoding = document.getElementById("encoding").value;

                var extension = (language === "cpp" || language === "rust") ? ".cgi" : ".py";
                var endpoint = "/hw2/cgi/" + language + "/echo-" + language + extension;
                
                this.action = endpoint;

                // boolean for use of fetch
                var useFetch = (method === "PUT" || method === "DELETE" || encoding === "app-json");

                // if it's a GET/POST with form-urlencoded, just submit normally
                if(!useFetch && (method === "GET" || method === "POST")) {
                    this.method = method;
                    return;
                }

                // for other request types, we need to use fetch API
                // preventing default form submission
                event.preventDefault();

                var formData = new FormData(this);

                if(encoding === "app-json"){
                    var jsonObject = {};
                    formData.forEach((value, key) => { jsonObject[key] = value; });

                    fetch(endpoint, {
                        method,
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(jsonObject),
                        credentials: "include",
                    }).then(response => response.text()).then(data => document.getElementById("output").textContent = data);
                }
                else{   // for application/x-www-form-urlencoded
                    fetch(endpoint, {
                        method,
                        headers: { "Content-Type": "application/x-www-form-urlencoded" },
                        body: new URLSearchParams(formData),
                        credentials: "include",
                    }).then(response => response.text()).then(data => document.getElementById("output").textContent = data);
                }
            });
        });
    </script>
</head>

<body>
    <h1>Echo Page</h1>

    <form id="echoForm" method="GET" action="/hw2/cgi/python/echo-python.py">
        <!-- Selecting desired language (Python, Rust, C++)-->
        <label for="language">Choose a language:</label>
        <select id="language" name="language">
            <option value="python">Python</option>
            <option value="rust">Rust</option>
            <option value="cpp">C++</option>
        </select>
        <br><br>

        <!-- Selecting the HTTP method (GET, POST, PUT, DELETE) -->
        <label for="method">Choose an HTTP method:</label>
        <select id="method" name="method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
        </select>
        <br><br>

        <!-- Selecting encoding method-->
        <label for="encoding">Choose an encoding method:</label>
        <select id="encoding" name="encoding">
            <option value="form-urlencoded">x-www-form-urlencoded</option>
            <option value="app-json">application/json</option>
        </select>
        <br><br>

        <!-- Set of fields to send with request -->
        <label for="name">Name:</label>
        <input id="name" name="name" type="text"><br><br>

        <label for="payload">Payload:</label>
        <input id="payload" name="payload" type="text"><br><br>
        <!-- Submit button-->
        <button type="submit">Send Request</button>
    </form>

    <hr>
    <pre id="output">Response</pre>

    <p>
        This SHOULD work without JavaScript too for get/post. 
        JS apparently only adds support for put/delete and json
    </p>
</body>
</html>
